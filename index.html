<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Procurement — Genesis Logística</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --font-sans: 'DM Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --color-bg: #ffffff; --color-bg2: #f5f5f4;
      --color-border: rgba(0,0,0,0.10); --color-border2: rgba(0,0,0,0.20);
      --color-text: #1a1a1a; --color-muted: #6b7280;
      --radius-md: 8px; --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root { --color-bg:#1a1a1a; --color-bg2:#242424; --color-border:rgba(255,255,255,0.10); --color-border2:rgba(255,255,255,0.20); --color-text:#f0f0f0; --color-muted:#9ca3af; }
    }
    body { font-family: var(--font-sans); background: var(--color-bg); color: var(--color-text); min-height: 100vh; }
    .header { padding: 14px 24px; border-bottom: 0.5px solid var(--color-border); display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: #185FA5; }
    .header-sub { font-size: 12px; color: var(--color-muted); }
    .sync-status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--color-muted); }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #639922; animation: pulseG 2s infinite; }
    .sync-dot.syncing { background: #BA7517; animation: pulseA 2s infinite; }
    .sync-dot.error { background: #A32D2D; animation: pulseR 2s infinite; }
    .container { max-width: 1280px; margin: 0 auto; padding: 24px 24px 48px; }

    /* ── SETUP BANNER ── */
    .setup-banner { background: #FAEEDA; border: 0.5px solid #E8C87A; border-radius: var(--radius-lg); padding: 20px 24px; margin-bottom: 24px; }
    .setup-banner h2 { font-size: 14px; font-weight: 600; color: #633806; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .setup-banner p { font-size: 12px; color: #854F0B; margin-bottom: 12px; }
    .setup-form { display: flex; gap: 8px; flex-wrap: wrap; }
    .setup-input { flex: 1; min-width: 200px; padding: 7px 10px; font-size: 12px; border: 0.5px solid #E8C87A; border-radius: 6px; background: #fff; color: #333; font-family: var(--font-sans); }
    .setup-input:focus { outline: none; border-color: #185FA5; }
    .setup-btn { padding: 7px 16px; font-size: 12px; font-weight: 500; background: #185FA5; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-family: var(--font-sans); }
    .setup-btn:hover { background: #0C447C; }

    /* ── LOADING ── */
    .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 12px; color: var(--color-muted); }
    .spinner { width: 28px; height: 28px; border: 2.5px solid var(--color-border); border-top-color: #185FA5; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── KPIs ── */
    .kpis { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1.25rem; }
    .kpi { background: var(--color-bg2); border-radius: var(--radius-lg); padding: 14px 16px; border: 0.5px solid var(--color-border); position: relative; overflow: hidden; transition: border-color .2s; }
    .kpi:hover { border-color: var(--color-border2); }
    .kpi::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; border-radius:2px 2px 0 0; }
    .kpi.blue::before{background:linear-gradient(90deg,#185FA5,#378ADD)} .kpi.green::before{background:linear-gradient(90deg,#3B6D11,#639922)}
    .kpi.amber::before{background:linear-gradient(90deg,#854F0B,#EF9F27)} .kpi.coral::before{background:linear-gradient(90deg,#993C1D,#D85A30)}
    .kpi-label { font-size:10px; font-weight:500; color:var(--color-muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px; }
    .kpi-val { font-size:26px; font-weight:600; color:var(--color-text); font-family:var(--font-mono); line-height:1; }
    .kpi-sub { font-size:11px; color:var(--color-muted); margin-top:4px; }
    .pulse-wrap { display:inline-flex; align-items:center; gap:5px; }
    .pulse { width:7px; height:7px; border-radius:50%; display:inline-block; flex-shrink:0; }
    .pulse.green{background:#639922;animation:pulseG 2s infinite} .pulse.amber{background:#BA7517;animation:pulseA 2s infinite} .pulse.red{background:#A32D2D;animation:pulseR 2s infinite}
    @keyframes pulseG{0%,100%{box-shadow:0 0 0 0 rgba(99,153,34,.5)}50%{box-shadow:0 0 0 5px rgba(99,153,34,0)}}
    @keyframes pulseA{0%,100%{box-shadow:0 0 0 0 rgba(186,117,23,.5)}50%{box-shadow:0 0 0 5px rgba(186,117,23,0)}}
    @keyframes pulseR{0%,100%{box-shadow:0 0 0 0 rgba(163,45,45,.5)}50%{box-shadow:0 0 0 5px rgba(163,45,45,0)}}

    /* ── TOPBAR ── */
    .topbar { display:flex; align-items:center; gap:10px; margin-bottom:1rem; flex-wrap:wrap; }
    .panel-title { font-size:14px; font-weight:600; flex:1; display:flex; align-items:center; gap:8px; }
    .panel-title i { font-size:17px; color:#185FA5; }
    .filters { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .flag-btn { position:relative; display:inline-block; }
    .flag-trigger { display:inline-flex; align-items:center; gap:5px; padding:5px 10px; font-size:12px; border:0.5px solid var(--color-border2); border-radius:var(--radius-md); background:var(--color-bg); color:var(--color-text); cursor:pointer; font-family:var(--font-sans); font-weight:500; transition:all .15s; user-select:none; }
    .flag-trigger:hover,.flag-trigger.open { background:var(--color-bg2); }
    .count-badge { background:#185FA5; color:#fff; font-size:10px; font-weight:600; border-radius:10px; padding:1px 6px; }
    .flag-dropdown { position:absolute; top:calc(100% + 4px); left:0; background:var(--color-bg); border:0.5px solid var(--color-border2); border-radius:var(--radius-lg); padding:10px; z-index:200; min-width:280px; box-shadow:0 4px 16px rgba(0,0,0,.12); animation:ddFade .15s ease; }
    @keyframes ddFade{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
    .reg-chip{display:flex;align-items:center;gap:8px;padding:7px 10px;border:0.5px solid var(--color-border);border-radius:var(--radius-md);cursor:pointer;margin-bottom:5px;transition:all .12s}
    .reg-chip:last-child{margin-bottom:0} .reg-chip:hover{border-color:var(--color-border2);background:var(--color-bg2)}
    .reg-chip.selected{border-color:#B5D4F4;background:#E6F1FB}
    .reg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0} .reg-chip-label{flex:1;font-size:12px;font-weight:500;color:var(--color-text)} .reg-chip-states{font-size:10px;color:var(--color-muted)}
    .reg-chip.selected .reg-chip-label{color:#0C447C} .reg-check{font-size:13px;color:#185FA5;opacity:0} .reg-chip.selected .reg-check{opacity:1}
    .flag-actions{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:0.5px solid var(--color-border)}
    .flag-act-btn{flex:1;padding:5px;font-size:11px;font-weight:500;border:0.5px solid var(--color-border2);border-radius:4px;background:var(--color-bg);color:var(--color-muted);cursor:pointer;font-family:var(--font-sans);text-align:center;transition:all .12s}
    .flag-act-btn:hover{background:var(--color-bg2);color:var(--color-text)}
    .tog{display:inline-flex;border:0.5px solid var(--color-border2);border-radius:var(--radius-md);overflow:hidden}
    .tog button{padding:5px 10px;font-size:11px;border:none;background:none;cursor:pointer;color:var(--color-muted);font-family:var(--font-sans);font-weight:500}
    .tog button.active{background:#E6F1FB;color:#0C447C}
    .icon-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;font-size:12px;border:0.5px solid var(--color-border2);border-radius:var(--radius-md);background:var(--color-bg);color:var(--color-text);cursor:pointer;font-family:var(--font-sans);font-weight:500;transition:all .15s}
    .icon-btn:hover{background:var(--color-bg2)} .icon-btn.excel{border-color:#3B6D11;color:#3B6D11} .icon-btn.excel:hover{background:#EAF3DE}
    .icon-btn.add{border-color:#185FA5;color:#185FA5} .icon-btn.add:hover{background:#E6F1FB}

    /* ── TABLE ── */
    .tbl-wrap{border:0.5px solid var(--color-border);border-radius:var(--radius-lg);overflow:hidden;overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;min-width:960px}
    thead th{background:var(--color-bg2);padding:8px 8px;text-align:left;font-size:10px;font-weight:600;color:var(--color-muted);text-transform:uppercase;letter-spacing:.07em;border-bottom:0.5px solid var(--color-border);cursor:pointer;user-select:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    thead th.th-nome{color:var(--color-text)} thead th:hover{color:var(--color-text)}
    .group-row td{background:var(--color-bg2);padding:5px 10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;border-bottom:0.5px solid var(--color-border);color:var(--color-muted)}
    .group-row td .grp-inner{display:flex;align-items:center;gap:7px} .grp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    tbody tr{border-bottom:0.5px solid var(--color-border);cursor:pointer;transition:background .12s}
    tbody tr:last-child{border-bottom:none} tbody tr:hover:not(.group-row){background:var(--color-bg2)}
    tbody tr.row-flash{animation:rowFlash .5s ease}
    @keyframes rowFlash{0%{background:rgba(55,138,221,.15)}100%{background:transparent}}
    tbody td{padding:7px 8px;color:var(--color-text);vertical-align:middle;overflow:hidden}
    col.c-reg{width:72px}col.c-est{width:54px}col.c-cob{width:72px}col.c-nom{width:130px}col.c-tip{width:66px}
    col.c-modal{width:72px}col.c-cap{width:68px}col.c-int{width:68px}col.c-otif{width:92px}col.c-hom{width:68px}col.c-cnt{width:98px}col.c-del{width:30px}
    .badge{display:inline-flex;align-items:center;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap}
    .b-cap{background:#E6F1FB;color:#0C447C} .b-int{background:#E1F5EE;color:#085041} .b-ci{background:#FAEEDA;color:#633806}
    .b-cat{background:#EEEDFE;color:#3C3489} .b-bkp{background:#F1EFE8;color:#444441}
    .b-sim{background:#EAF3DE;color:#27500A;cursor:pointer} .b-nao{background:#FCEBEB;color:#791F1F;cursor:pointer} .sim-glow{box-shadow:0 0 6px rgba(99,153,34,.35)}
    .b-ltl{background:#E6F1FB;color:#0C447C} .b-ftl{background:#EEEDFE;color:#3C3489} .b-ambos{background:#FAEEDA;color:#633806}
    .reg-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600}
    td.td-nome{font-weight:500}
    .num-in{width:42px;padding:2px 4px;font-size:11px;border:0.5px solid var(--color-border);border-radius:4px;background:transparent;color:var(--color-text);text-align:right;font-family:var(--font-mono)}
    .num-in:focus{outline:none;border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,.12)}
    .pct{font-size:10px;color:var(--color-muted)}
    .txt-in{width:100%;padding:2px 5px;font-size:12px;font-weight:500;border:0.5px solid var(--color-border);border-radius:4px;background:transparent;color:var(--color-text);font-family:var(--font-sans)}
    .txt-in:focus{outline:none;border-color:#378ADD}
    .sel-sm{padding:2px 3px;font-size:11px;border:0.5px solid var(--color-border);border-radius:4px;background:transparent;color:var(--color-text)}
    .otif-row{display:flex;align-items:center;gap:4px} .bar-bg{flex:1;height:3px;background:var(--color-bg2);border-radius:2px;overflow:hidden;min-width:20px} .bar-fill{height:100%;border-radius:2px;transition:width .4s}
    .cnt-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;background:var(--color-bg2);border:0.5px solid var(--color-border2);border-radius:20px;font-size:11px;color:var(--color-muted);max-width:94px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
    .cnt-pill:hover{border-color:#378ADD;color:#185FA5} .cnt-pill i{font-size:11px;flex-shrink:0}
    .del-btn{background:none;border:none;cursor:pointer;color:var(--color-muted);padding:2px 3px;border-radius:4px;line-height:1} .del-btn:hover{color:#A32D2D;background:#FCEBEB}

    /* ── MODAL ── */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;animation:ddFade .18s ease}
    .modal{background:var(--color-bg);border-radius:var(--radius-lg);border:0.5px solid var(--color-border2);width:100%;max-width:580px;max-height:88vh;display:flex;flex-direction:column;animation:slideUp .2s ease}
    @keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-head{padding:16px 20px 14px;border-bottom:0.5px solid var(--color-border);display:flex;align-items:flex-start;gap:12px}
    .modal-icon{width:38px;height:38px;border-radius:var(--radius-md);background:#E6F1FB;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .modal-icon i{font-size:20px;color:#185FA5} .modal-meta h3{font-size:15px;font-weight:600;color:var(--color-text)} .modal-meta p{font-size:12px;color:var(--color-muted);margin-top:2px}
    .modal-close{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--color-muted);padding:4px;border-radius:4px;line-height:1} .modal-close:hover{background:var(--color-bg2)}
    .modal-tabs{display:flex;border-bottom:0.5px solid var(--color-border);padding:0 20px}
    .m-tab{padding:10px 14px;font-size:12px;font-weight:500;color:var(--color-muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:all .15s;display:flex;align-items:center;gap:5px}
    .m-tab:hover{color:var(--color-text)} .m-tab.active{color:#185FA5;border-bottom-color:#185FA5}
    .m-tab .tab-ct{font-size:10px;background:var(--color-bg2);border-radius:10px;padding:1px 6px} .m-tab.active .tab-ct{background:#E6F1FB;color:#185FA5}
    .modal-body{padding:16px 20px;overflow-y:auto;flex:1} .tab-panel{display:none} .tab-panel.active{display:block}
    .sector-block{margin-bottom:14px}
    .sector-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--color-muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
    .sector-label::after{content:'';flex:1;height:0.5px;background:var(--color-border)}
    .contact-card{display:flex;align-items:center;gap:10px;padding:8px 10px;border:0.5px solid var(--color-border);border-radius:var(--radius-md);margin-bottom:6px;transition:border-color .15s}
    .contact-card:hover{border-color:var(--color-border2)}
    .contact-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
    .contact-info{flex:1;min-width:0} .ci-name{font-size:13px;font-weight:500;color:var(--color-text)} .ci-role{font-size:11px;color:var(--color-muted)}
    .ci-data{font-size:11px;color:var(--color-muted);margin-top:2px;display:flex;gap:10px;flex-wrap:wrap} .ci-data i{font-size:11px}
    .cnt-del{background:none;border:none;cursor:pointer;color:var(--color-muted);padding:3px;border-radius:4px} .cnt-del:hover{color:#A32D2D;background:#FCEBEB}
    .add-form-block{padding:12px;background:var(--color-bg2);border-radius:var(--radius-md);margin-top:8px;border:0.5px solid var(--color-border)}
    .form-section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--color-muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px} .form-row.three{grid-template-columns:1fr 1fr 1fr}
    .form-field label{font-size:10px;font-weight:500;color:var(--color-muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:3px}
    .form-field input,.form-field select{width:100%;padding:6px 8px;font-size:12px;border:0.5px solid var(--color-border2);border-radius:4px;background:var(--color-bg);color:var(--color-text);font-family:var(--font-sans)}
    .form-field input:focus,.form-field select:focus{outline:none;border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,.1)}
    .btn-add-item{width:100%;padding:7px;font-size:12px;font-weight:500;background:#E6F1FB;color:#0C447C;border:0.5px solid #B5D4F4;border-radius:4px;cursor:pointer;font-family:var(--font-sans);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
    .btn-add-item:hover{background:#B5D4F4}
    .cliente-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
    .cliente-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border:0.5px solid var(--color-border);border-radius:var(--radius-md);transition:border-color .15s}
    .cliente-item:hover{border-color:var(--color-border2)} .cli-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .cli-name{flex:1;font-size:13px;font-weight:500;color:var(--color-text)} .cli-since{font-size:11px;color:var(--color-muted)}
    .cli-del{background:none;border:none;cursor:pointer;color:var(--color-muted);padding:3px;border-radius:4px} .cli-del:hover{color:#A32D2D;background:#FCEBEB}
    .modal-foot{padding:12px 20px;border-top:0.5px solid var(--color-border);display:flex;justify-content:flex-end}
    .btn-close-modal{padding:7px 18px;font-size:13px;font-weight:500;border:0.5px solid var(--color-border2);border-radius:var(--radius-md);background:var(--color-bg);color:var(--color-text);cursor:pointer;font-family:var(--font-sans)}
    .btn-close-modal:hover{background:var(--color-bg2)}
    .add-modal{background:var(--color-bg);border-radius:var(--radius-lg);border:0.5px solid var(--color-border2);width:100%;max-width:480px;animation:slideUp .2s ease}
    .add-modal-head{padding:16px 20px;border-bottom:0.5px solid var(--color-border);display:flex;align-items:center;gap:10px}
    .add-modal-head h3{font-size:14px;font-weight:600;color:var(--color-text);flex:1}
    .option-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border:0.5px solid var(--color-border);border-radius:var(--radius-md);cursor:pointer;margin-bottom:8px;transition:all .15s}
    .option-card:hover{border-color:var(--color-border2);background:var(--color-bg2)}
    .option-icon{width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .option-title{font-size:13px;font-weight:500;color:var(--color-text)} .option-desc{font-size:11px;color:var(--color-muted);margin-top:1px}
    .copy-list{max-height:220px;overflow-y:auto;margin-bottom:12px}
    .copy-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border:0.5px solid var(--color-border);border-radius:var(--radius-md);cursor:pointer;margin-bottom:6px;transition:all .15s}
    .copy-item:hover{border-color:#378ADD;background:#E6F1FB}
    .copy-item-name{font-size:13px;font-weight:500;color:var(--color-text);flex:1} .copy-item-meta{font-size:11px;color:var(--color-muted)}
    .back-btn{background:none;border:none;cursor:pointer;color:var(--color-muted);font-size:12px;font-family:var(--font-sans);display:flex;align-items:center;gap:4px;padding:0;margin-bottom:12px}
    .back-btn:hover{color:var(--color-text)}
    .hint{font-size:10px;color:var(--color-muted);margin-top:8px;text-align:center;letter-spacing:.02em}
    @media(max-width:640px){.kpis{grid-template-columns:1fr 1fr}.container{padding:16px}}
  </style>
</head>
<body>
<header class="header">
  <div class="logo"><div class="logo-dot"></div>Genesis Logística</div>
  <span class="header-sub">/ Procurement — Transportadores</span>
  <div class="sync-status" id="syncStatus"><div class="sync-dot" id="syncDot"></div><span id="syncLabel">conectado</span></div>
</header>
<div class="container">
  <div id="setup-area"></div>
  <div id="app"></div>
  <div id="modal-root"></div>
  <div id="add-modal-root"></div>
</div>

<script>
// ─────────────────────────────────────────────
//  CONFIG — cole aqui após criar o Supabase
// ─────────────────────────────────────────────
const CFG_KEY = 'genesis_supabase_cfg';
let SUPABASE_URL = '';
let SUPABASE_ANON_KEY = '';
let sbClient = null;

function loadCfg() {
  try {
    const c = JSON.parse(localStorage.getItem(CFG_KEY) || '{}');
    SUPABASE_URL = c.url || '';
    SUPABASE_ANON_KEY = c.key || '';
  } catch(e){}
}
function saveCfg(url, key) {
  localStorage.setItem(CFG_KEY, JSON.stringify({url, key}));
}
function isConfigured() { return SUPABASE_URL && SUPABASE_ANON_KEY; }

// ─────────────────────────────────────────────
//  SETUP BANNER
// ─────────────────────────────────────────────
function renderSetupBanner() {
  const el = document.getElementById('setup-area');
  if (isConfigured()) { el.innerHTML = ''; return; }
  el.innerHTML = `
  <div class="setup-banner">
    <h2><i class="ti ti-database" style="font-size:16px"></i>Configure o banco de dados (só uma vez)</h2>
    <p>Cole a URL do projeto e a chave anon do Supabase para ativar o banco compartilhado da equipe.<br>
       <strong>Não sabe onde pegar?</strong> Siga o tutorial do README no GitHub do projeto.</p>
    <div class="setup-form">
      <input class="setup-input" id="cfgUrl" placeholder="https://xxxx.supabase.co" />
      <input class="setup-input" id="cfgKey" placeholder="eyJhbGciO... (anon key)" />
      <button class="setup-btn" onclick="connectSupabase()"><i class="ti ti-plug" style="font-size:13px;vertical-align:-1px"></i> Conectar</button>
    </div>
  </div>`;
}

window.connectSupabase = async () => {
  const url = document.getElementById('cfgUrl').value.trim();
  const key = document.getElementById('cfgKey').value.trim();
  if (!url || !key) { alert('Preencha os dois campos.'); return; }
  saveCfg(url, key);
  SUPABASE_URL = url; SUPABASE_ANON_KEY = key;
  await initSupabase();
};

// ─────────────────────────────────────────────
//  SUPABASE INIT
// ─────────────────────────────────────────────
async function initSupabase() {
  try {
    sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    setSyncStatus('syncing', 'carregando...');
    await loadFromDB();
    renderSetupBanner();
    subscribeRealtime();
    setSyncStatus('ok', 'conectado');
  } catch(e) {
    setSyncStatus('error', 'erro de conexão');
    console.error(e);
  }
}

function setSyncStatus(state, label) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  if (!dot) return;
  dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
  lbl.textContent = label;
}

// ─────────────────────────────────────────────
//  DATABASE OPERATIONS
// ─────────────────────────────────────────────
async function loadFromDB() {
  const { data: rows, error } = await sbClient
    .from('transportadores')
    .select('*')
    .order('id', { ascending: true });
  if (error) throw error;
  data = rows.map(r => ({
    id: r.id,
    estado: r.estado,
    cobertura: r.cobertura,
    nome: r.nome,
    tipo: r.tipo,
    modal: r.modal,
    custoCAP: r.custo_cap,
    custoINT: r.custo_int,
    otif: r.otif,
    homologado: r.homologado,
    contatos: r.contatos || [],
    clientes: r.clientes || [],
  }));
  dbLoaded = true;
  render();
}

async function dbInsert(row) {
  setSyncStatus('syncing', 'salvando...');
  const { data: inserted, error } = await sbClient
    .from('transportadores')
    .insert([toDbRow(row)])
    .select()
    .single();
  if (error) { setSyncStatus('error', 'erro ao salvar'); console.error(error); return null; }
  setSyncStatus('ok', 'salvo');
  return inserted.id;
}

async function dbUpdate(id, fields) {
  setSyncStatus('syncing', 'salvando...');
  const dbFields = {};
  if ('estado'      in fields) dbFields.estado     = fields.estado;
  if ('cobertura'   in fields) dbFields.cobertura  = fields.cobertura;
  if ('nome'        in fields) dbFields.nome        = fields.nome;
  if ('tipo'        in fields) dbFields.tipo        = fields.tipo;
  if ('modal'       in fields) dbFields.modal       = fields.modal;
  if ('custoCAP'    in fields) dbFields.custo_cap   = fields.custoCAP;
  if ('custoINT'    in fields) dbFields.custo_int   = fields.custoINT;
  if ('otif'        in fields) dbFields.otif        = fields.otif;
  if ('homologado'  in fields) dbFields.homologado  = fields.homologado;
  if ('contatos'    in fields) dbFields.contatos    = fields.contatos;
  if ('clientes'    in fields) dbFields.clientes    = fields.clientes;
  const { error } = await sbClient.from('transportadores').update(dbFields).eq('id', id);
  if (error) { setSyncStatus('error', 'erro ao salvar'); console.error(error); return; }
  setSyncStatus('ok', 'salvo');
}

async function dbDelete(id) {
  setSyncStatus('syncing', 'removendo...');
  const { error } = await sbClient.from('transportadores').delete().eq('id', id);
  if (error) { setSyncStatus('error', 'erro'); console.error(error); return; }
  setSyncStatus('ok', 'removido');
}

function toDbRow(r) {
  return { estado:r.estado, cobertura:r.cobertura, nome:r.nome, tipo:r.tipo, modal:r.modal,
           custo_cap:r.custoCAP, custo_int:r.custoINT, otif:r.otif, homologado:r.homologado,
           contatos:r.contatos||[], clientes:r.clientes||[] };
}

// Realtime — atualiza automaticamente quando outro usuário editar
function subscribeRealtime() {
  sbClient.channel('transportadores-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'transportadores' }, () => {
      loadFromDB();
    })
    .subscribe();
}

  {id:'nordeste',label:'Nordeste',estados:['AL','BA','CE','MA','PB','PE','PI','RN','SE'],color:'#BA7517',bg:'#FAEEDA',textColor:'#633806',order:4},
  {id:'norte',label:'Norte',estados:['AC','AM','AP','PA','RO','RR','TO'],color:'#993C1D',bg:'#FAECE7',textColor:'#712B13',order:5},
];

    let dbLoaded = false;

let sortCol='regiao', sortDir=1;

function regiaoOf(e){return REGIOES.find(r=>r.estados.includes(e))||REGIOES[4]}
function initials(n){return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()}
function avColor(i){const[bg,col]=AV_COLORS[i%AV_COLORS.length].split('|');return{bg,col}}
function otifColor(v){return v>=90?'#639922':v>=80?'#BA7517':'#A32D2D'}
function pulseClass(v){return v>=90?'green':v>=80?'amber':'red'}

  const r = data.find(x=>x.id===id); if(!r) return;
  r[f] = v===''?null:isNaN(+v)?v:+v; render();

window.copyFrom = async srcId => {
  const src = data.find(x=>x.id===srcId); if(!src) return;
  addFlow=null; renderAddModal();
  const copy = {...src, estado:'SP', id:undefined, contatos:[...src.contatos], clientes:[...src.clientes]};
  delete copy.id;
  const newId = await dbInsert(copy);
  if (newId) { copy.id = newId; data.push(copy); render();
    setTimeout(()=>{const rows=document.querySelectorAll('tbody tr:not(.group-row)');const last=rows[rows.length-1];if(last){last.classList.add('row-flash');setTimeout(()=>last.classList.remove('row-flash'),600)}},60);

document.addEventListener('click',e=>{if(flagOpen&&!e.target.closest('.flag-btn')){flagOpen=false;render()}})

function getSortedRows(rows){
  return [...rows].sort((a,b)=>{
    const ra=regiaoOf(a.estado),rb=regiaoOf(b.estado);
    if(sortCol==='regiao'){const d=(ra.order-rb.order)*sortDir;return d!==0?d:a.estado.localeCompare(b.estado)}
    let av=a[sortCol],bv=b[sortCol];if(av==null)av='';if(bv==null)bv='';
    return(typeof av==='string'?av.localeCompare(bv):(av-bv))*sortDir;
  });
}

function render(){
  const selReg=[...selectedRegioes];
  let rows=data.filter(r=>{const reg=regiaoOf(r.estado);return(selReg.length===0||selReg.includes(reg.id))&&(filterTipo==='Todos'||r.tipo===filterTipo)});
  const sorted=getSortedRows(rows);
  const groups=[];let lastReg=null;
  sorted.forEach(r=>{const reg=regiaoOf(r.estado);if(reg.id!==lastReg){groups.push({reg,rows:[]});lastReg=reg.id}groups[groups.length-1].rows.push(r)});
  const homOk=data.filter(r=>r.homologado).length, cativos=data.filter(r=>r.tipo==='Cativo').length;
  const avgOtif=data.length?(data.reduce((s,r)=>s+(r.otif||0),0)/data.length).toFixed(1):0;
  const estadosQt=[...new Set(data.map(r=>r.estado))].length;
  const sa=c=>`<span style="font-size:9px;opacity:${sortCol===c?.9:.25};margin-left:2px">${sortCol===c?(sortDir>0?'▲':'▼'):'⬍'}</span>`;
  const selCount=selectedRegioes.size;
  const flagDropdown=flagOpen?`<div class="flag-dropdown" onclick="event.stopPropagation()">${REGIOES.map(reg=>`<div class="reg-chip ${selectedRegioes.has(reg.id)?'selected':''}" onclick="toggleRegiao('${reg.id}')"><div class="reg-dot" style="background:${reg.color}"></div><div class="reg-chip-label">${reg.label}</div><div class="reg-chip-states">${reg.estados.join(' · ')}</div><i class="ti ti-check reg-check"></i></div>`).join('')}<div class="flag-actions"><div class="flag-act-btn" onclick="clearRegioes()"><i class="ti ti-x" style="font-size:11px;vertical-align:-1px"></i> Limpar</div></div></div>`:'';

  if(!isConfigured()){
    document.getElementById('app').innerHTML=`<div class="loading-screen"><i class="ti ti-database-off" style="font-size:40px;opacity:.3"></i><p style="font-size:14px;font-weight:500">Banco de dados não configurado</p><p style="font-size:12px">Preencha a URL e a chave do Supabase acima para começar.</p></div>`;
    return;
  }
  if(!dbLoaded && sbClient){
    document.getElementById('app').innerHTML=`<div class="loading-screen"><div class="spinner"></div><p>Carregando dados...</p></div>`;
    return;
  }

  const tableRows=groups.length===0
    ?`<tr><td colspan="12" style="text-align:center;padding:2rem;color:#9ca3af;font-size:13px"><i class="ti ti-inbox" style="font-size:22px;display:block;margin-bottom:8px;opacity:.4"></i>Nenhum resultado</td></tr>`
    :groups.map(g=>{
      const hdr=`<tr class="group-row"><td colspan="12"><div class="grp-inner"><div class="grp-dot" style="background:${g.reg.color}"></div>${g.reg.label.toUpperCase()} — ${g.rows.length} transportadora${g.rows.length!==1?'s':''}</div></td></tr>`;
      const rHtml=g.rows.map(r=>{
        const reg=g.reg, oFill=`background:${otifColor(r.otif||0)};width:${Math.min(r.otif||0,100)}%`;
        const pc=r.contatos[0], extra=r.contatos.length>1?` +${r.contatos.length-1}`:'';
        const cntHtml=pc?`<span class="cnt-pill" onclick="openContatos(${r.id},'contatos')"><i class="ti ti-user"></i>${pc.nome.split(' ')[0]}${extra}</span>`:`<span class="cnt-pill" onclick="openContatos(${r.id},'contatos')"><i class="ti ti-user-plus"></i>Adicionar</span>`;
        return `<tr ondblclick="openContatos(${r.id},'contatos')">
          <td><span class="reg-badge" style="background:${reg.bg};color:${reg.textColor}"><span style="width:5px;height:5px;border-radius:50%;background:${reg.color};display:inline-block;margin-right:3px"></span>${reg.label}</span></td>
          <td><select class="sel-sm" onchange="updateField(${r.id},'estado',this.value)" style="width:50px">${TODOS_ESTADOS.map(e=>`<option ${r.estado===e?'selected':''}>${e}</option>`).join('')}</select></td>
          <td><select class="sel-sm" onchange="updateField(${r.id},'cobertura',this.value)">${['CAP','INT','CAP+INT'].map(c=>`<option ${r.cobertura===c?'selected':''}>${c}</option>`).join('')}</select></td>
          <td class="td-nome"><input class="txt-in" value="${r.nome}" onchange="updateField(${r.id},'nome',this.value)" title="${r.nome}" /></td>
          <td><select class="sel-sm" onchange="updateField(${r.id},'tipo',this.value)"><option ${r.tipo==='Cativo'?'selected':''}>Cativo</option><option ${r.tipo==='Backup'?'selected':''}>Backup</option></select></td>
          <td><select class="sel-sm" onchange="updateField(${r.id},'modal',this.value)"><option ${r.modal==='LTL'?'selected':''}>LTL</option><option ${r.modal==='FTL'?'selected':''}>FTL</option><option ${r.modal==='LTL+FTL'?'selected':''}>LTL+FTL</option></select></td>
          <td><div style="display:flex;align-items:center;gap:2px"><input class="num-in" type="number" step="0.1" value="${r.custoCAP??''}" placeholder="—" onchange="updateField(${r.id},'custoCAP',this.value)" /><span class="pct">%</span></div></td>
          <td><div style="display:flex;align-items:center;gap:2px"><input class="num-in" type="number" step="0.1" value="${r.custoINT??''}" placeholder="—" onchange="updateField(${r.id},'custoINT',this.value)" /><span class="pct">%</span></div></td>
          <td><div class="otif-row"><input class="num-in" type="number" min="0" max="100" step="1" value="${r.otif??0}" onchange="updateField(${r.id},'otif',this.value)" style="width:32px" /><span class="pct">%</span><span class="pulse ${pulseClass(r.otif||0)}" style="animation-delay:${r.id*.18}s"></span><div class="bar-bg"><div class="bar-fill" style="${oFill}"></div></div></div></td>
          <td><span class="badge ${r.homologado?'b-sim sim-glow':'b-nao'}" onclick="toggleHom(${r.id})">${r.homologado?'Sim':'Não'}</span></td>
          <td>${cntHtml}</td>
          <td><button class="del-btn" onclick="event.stopPropagation();deleteRow(${r.id})"><i class="ti ti-trash"></i></button></td>
        </tr>`;
      }).join('');
      return hdr+rHtml;
    }).join('');

  document.getElementById('app').innerHTML=`
  <div class="kpis">
    <div class="kpi blue"><div class="kpi-label">Transportadoras</div><div class="kpi-val">${data.length}</div><div class="kpi-sub">${cativos} cativas · ${data.length-cativos} backup</div></div>
    <div class="kpi green"><div class="kpi-label">Estados atendidos</div><div class="kpi-val">${estadosQt}</div><div class="kpi-sub">de 27 UFs</div></div>
    <div class="kpi amber"><div class="kpi-label">OTIF médio</div><div class="kpi-val">${avgOtif}%</div><div class="kpi-sub"><span class="pulse-wrap"><span class="pulse ${pulseClass(+avgOtif)}"></span>tempo real</span></div></div>
    <div class="kpi coral"><div class="kpi-label">Homologadas</div><div class="kpi-val">${homOk}</div><div class="kpi-sub">${data.length-homOk} pendente${data.length-homOk!==1?'s':''}</div></div>
  </div>
  <div class="topbar">
    <span class="panel-title"><i class="ti ti-truck"></i>Transportadores por região</span>
    <div class="filters">
      <div class="flag-btn"><div class="flag-trigger ${flagOpen?'open':''}" onclick="toggleFlagOpen()"><i class="ti ti-map-2" style="font-size:13px"></i>${selCount===0?'Região':selCount===1?REGIOES.find(r=>selectedRegioes.has(r.id))?.label:`${selCount} regiões`}${selCount>0?`<span class="count-badge">${selCount}</span>`:''}<i class="ti ti-chevron-down" style="font-size:11px;opacity:.5"></i></div>${flagDropdown}</div>
      <div class="tog"><button class="${filterTipo==='Todos'?'active':''}" onclick="setFilterTipo('Todos')">Todos</button><button class="${filterTipo==='Cativo'?'active':''}" onclick="setFilterTipo('Cativo')">Cativo</button><button class="${filterTipo==='Backup'?'active':''}" onclick="setFilterTipo('Backup')">Backup</button></div>
      <button class="icon-btn excel" onclick="exportExcel()"><i class="ti ti-file-spreadsheet"></i>Excel</button>
      <button class="icon-btn add" onclick="openAddFlow()"><i class="ti ti-plus"></i>Adicionar</button>
    </div>
  </div>
  <div class="tbl-wrap"><table>
    <colgroup><col class="c-reg"><col class="c-est"><col class="c-cob"><col class="c-nom"><col class="c-tip"><col class="c-modal"><col class="c-cap"><col class="c-int"><col class="c-otif"><col class="c-hom"><col class="c-cnt"><col class="c-del"></colgroup>
    <thead><tr>
      <th onclick="setSort('regiao')">Região${sa('regiao')}</th><th onclick="setSort('estado')">UF${sa('estado')}</th><th onclick="setSort('cobertura')">Cobertura${sa('cobertura')}</th>
      <th class="th-nome" onclick="setSort('nome')">Transportadora${sa('nome')}</th><th onclick="setSort('tipo')">Tipo${sa('tipo')}</th><th onclick="setSort('modal')">Modal${sa('modal')}</th>
      <th onclick="setSort('custoCAP')">Custo CAP${sa('custoCAP')}</th><th onclick="setSort('custoINT')">Custo INT${sa('custoINT')}</th><th onclick="setSort('otif')">OTIF${sa('otif')}</th>
      <th onclick="setSort('homologado')">Homolog.${sa('homologado')}</th><th>Contato</th><th></th>
    </tr></thead>
    <tbody>${tableRows}</tbody>
  </table></div>
  <div class="hint">Duplo clique na linha para contatos e clientes · Dados salvos em tempo real para toda a equipe</div>`;
  if(openModal)renderModal();
  if(addFlow)renderAddModal();
}

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
loadCfg();
renderSetupBanner();
render();
if(isConfigured()) initSupabase();
</script>
</body>
</html>
